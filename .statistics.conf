# CodeStat Configuration File / CodeStat 配置文件
# Place this file in the same directory as statistics.sh / 将此文件放在 statistics.sh 同目录下
# All values are optional. If not set, default values will be used / 所有值都是可选的，如果不设置将使用默认值

# Scan directory (absolute or relative path) / 扫描目录（绝对路径或相对路径）
# Default: . (current directory) / 默认值：.（当前目录）
SCAN_DIR="../../Java/CBIBank"

# Scan depth (recursively find git repositories depth) / 扫描深度（递归查找 git 仓库的层数）
# Default: 3 / 默认值：3
SCAN_DEPTH=3

# Statistics branches (comma-separated, empty means current branch only) / 统计分支（多个分支用逗号分隔，留空表示仅统计当前分支）
# Default: (empty) / 默认值：空
# Examples: / 示例：
STATS_BRANCHES="feature-20250910 feature-20260106 feature-20260122 feature-20260115" # 统计指定多个分支 / 统计指定多个分支 
# STATS_BRANCHES="master"                      # 只统计 master 分支 / 仅统计 master 分支
# STATS_BRANCHES="feature-*"                   # 统计所有 feature-* 分支 / 统计所有 feature-* 分支

# Workday code standard (lines per day) / 工作日代码量标准（行/天）
# Default: 500 / 默认值：500
DAILY_CODE_STANDARD=500

# Example configuration / 配置示例：
# SCAN_DIR="/path/to/your/projects"
# SCAN_DEPTH=5
# DAILY_CODE_STANDARD=800
