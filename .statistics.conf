# CodeStat Configuration File / CodeStat 配置文件
# Place this file in the same directory as statistics.sh / 将此文件放在 statistics.sh 同目录下
# All values are optional. If not set, default values will be used / 所有值都是可选的，如果不设置将使用默认值

# Scan directory (absolute or relative path) / 扫描目录（绝对路径或相对路径）
# Default: . (current directory) / 默认值：.（当前目录）
SCAN_DIR="../../Java/CBIBank"

# Scan depth (recursively find git repositories depth) / 扫描深度（递归查找 git 仓库的层数）
# Default: 3 / 默认值：3
SCAN_DEPTH=4

# Statistics branches (comma-separated, empty means current branch only) / 统计分支（多个分支用逗号分隔，留空表示仅统计当前分支）
# Default: (empty) / 默认值：空
# Examples: / 示例：
# STATS_BRANCHES="master"                      # 只统计 master 分支 / 仅统计 master 分支
# STATS_BRANCHES="main,master"                 # 统计 main 和 master 分支 / 统计 main 和 master 分支
# STATS_BRANCHES="feature/login,feature/api"   # 统计指定多个分支 / 统计指定多个分支
STATS_BRANCHES="feature-customer-batchclosecustomer-20260317"

# Workday code standard (lines per day) / 工作日代码量标准（行/天）
# Default: 500 / 默认值：500
DAILY_CODE_STANDARD=500

# Exclude directories (space-separated) / 排除目录（多个用空格分隔）
# Default: (empty) / 默认值：空
# Example: EXCLUDE_DIRS="node_modules vendor build" / 示例：EXCLUDE_DIRS="node_modules vendor build"
# EXCLUDE_DIRS="node_modules"

# Author name to track (defaults to git user.name) / 统计的用户名（默认使用 git 的 user.name）
# Default: (empty, use git config) / 默认值：空（使用 git 配置）
# Example: AUTHOR="John Doe john@example.com"  支持多个作者用逗号分隔 / supports multiple authors separated by comma
# AUTHOR="Your Name"

# Example configuration / 配置示例：
# SCAN_DIR="/path/to/your/projects"
# SCAN_DEPTH=5
# DAILY_CODE_STANDARD=800
# EXCLUDE_DIRS="node_modules vendor build"
# AUTHOR="John Doe"
