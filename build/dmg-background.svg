<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg-gradient)"/>
  <circle cx="80" cy="80" r="30" fill="#4caf50" opacity="0.1"/>
  <circle cx="520" cy="320" r="40" fill="#4caf50" opacity="0.08"/>
  <circle cx="550" cy="60" r="25" fill="#2196f3" opacity="0.1"/>
  <text x="50" y="60" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="white">GitBoard</text>
  <text x="50" y="90" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#8888aa">Git 代码提交统计面板</text>
  <text x="50" y="360" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#666688">将应用拖入 Applications 文件夹以安装</text>
</svg>