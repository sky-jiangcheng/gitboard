<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9f9f7"/>
      <stop offset="100%" style="stop-color:#e8e8e6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7d4a"/>
      <stop offset="100%" style="stop-color:#6b9b6b"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="48" y="48" width="416" height="416" rx="72" fill="url(#bg)"/>
  <rect x="48" y="48" width="416" height="416" rx="72" fill="none" stroke="#e5e3de" stroke-width="2"/>

  <!-- Git branch visualization -->
  <g transform="translate(80, 100)">
    <!-- Main branch line -->
    <line x1="64" y1="80" x2="320" y2="80" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>

    <!-- Branch nodes -->
    <circle cx="64" cy="80" r="20" fill="#4a7d4a"/>
    <circle cx="176" cy="80" r="20" fill="#6b9b6b"/>
    <circle cx="320" cy="80" r="20" fill="#4a7d4a"/>

    <!-- Feature branch (fork) -->
    <path d="M 176 80 Q 176 40 240 40 L 280 40" stroke="#6b9b6b" stroke-width="10" stroke-linecap="round" fill="none"/>
    <circle cx="280" cy="40" r="16" fill="#6b9b6b"/>

    <!-- Merge point -->
    <path d="M 280 40 Q 280 80 320 80" stroke="#6b9b6b" stroke-width="10" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Board/dashboard bars -->
  <g transform="translate(80, 260)">
    <rect x="0" y="0" width="48" height="120" rx="8" fill="#c8e6c9"/>
    <rect x="72" y="40" width="48" height="80" rx="8" fill="#81c784"/>
    <rect x="144" y="20" width="48" height="100" rx="8" fill="#4caf50"/>
    <rect x="216" y="60" width="48" height="60" rx="8" fill="#30a14e"/>
    <rect x="288" y="30" width="48" height="90" rx="8" fill="#2e7d32"/>
  </g>

  <!-- GitBoard text hint (optional, subtle) -->
  <text x="256" y="420" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#5f5f5a" letter-spacing="-1">GitBoard</text>
</svg>