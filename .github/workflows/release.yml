name: Build and Release (Wails)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - target: darwin-amd64
            runner: macos-13
            goos: darwin
            goarch: amd64
          - target: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
          - target: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Build Frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Build Wails app
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          wails build -platform ${{ matrix.goos }}/${{ matrix.goarch }} -clean

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          cd build/bin
          mkdir -p release
          tar -czf "release/gitboard-linux-amd64.tar.gz" gitboard
          echo "RELEASE_DIR=build/bin/release" >> $GITHUB_ENV

      - name: Install Pillow for DMG background
        if: runner.os == 'macOS'
        run: pip3 install Pillow --quiet

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          set -e
          mkdir -p release

          # Wails produces .app bundle in build/bin/
          APP=$(ls -d build/bin/*.app 2>/dev/null | head -1)
          APP_NAME=$(basename "$APP" .app)

          if [ -n "$APP" ]; then
            # Create staging directory for DMG
            STAGING_DIR=$(mktemp -d -t gitboard-dmg)
            cp -R "$APP" "$STAGING_DIR/"
            ln -s /Applications "$STAGING_DIR/Applications"

            # Create background image
            BG_DIR="$STAGING_DIR/.background"
            mkdir -p "$BG_DIR"
            BG_FILE="$BG_DIR/dmg-background.png"

            if [ -f "web/public/icon-512.png" ]; then
              python3 -c "from PIL import Image, ImageDraw; import sys; icon = Image.open(sys.argv[1]).convert('RGBA'); bg = Image.new('RGBA', (600, 400), (45, 38, 64, 255)); icon_small = icon.resize((128, 128), Image.LANCZOS); bg.paste(icon_small, (130, 80), icon_small); draw = ImageDraw.Draw(bg); draw.rectangle([380, 90, 540, 250], outline=(100, 90, 130, 255), width=2); bg.save(sys.argv[2])" "web/public/icon-512.png" "$BG_FILE" 2>/dev/null || rm -f "$BG_FILE"
            fi

            # Create initial read-write DMG
            TMP_DMG="/tmp/gitboard-tmp.dmg"
            FINAL_DMG="release/gitboard-${{ matrix.target }}.dmg"

            hdiutil create -volname GitBoard \
              -srcfolder "$STAGING_DIR" \
              -ov -format UDRW \
              "$TMP_DMG"

            # Mount DMG
            MOUNT_POINT="/Volumes/GitBoard"
            hdiutil attach "$TMP_DMG" -nobrowse -mountpoint "$MOUNT_POINT"

            # Set Finder window appearance via AppleScript
            sleep 2

            if [ -f "$MOUNT_POINT/.background/dmg-background.png" ]; then
              BG_SCRIPT="set background picture of viewOptions to file \".background:dmg-background.png\""
            else
              BG_SCRIPT=""
            fi

            osascript <<EOF
              tell application "Finder"
                tell disk "GitBoard"
                  open
                  set current view of container window to icon view
                  set toolbar visible of container window to false
                  set statusbar visible of container window to false
                  set the bounds of container window to {100, 100, 700, 500}
                  set viewOptions to the icon view options of container window
                  set arrangement of viewOptions to not arranged
                  set icon size of viewOptions to 128
                  set text size of viewOptions to 13
                  $BG_SCRIPT
                  set position of item "${APP_NAME}.app" of container window to {130, 160}
                  set position of item "Applications" of container window to {470, 160}
                  close
                  open
                  update without registering applications
                  delay 2
                end tell
              end tell
            EOF

            # Unmount and convert to compressed read-only DMG
            hdiutil detach "$MOUNT_POINT"
            hdiutil convert "$TMP_DMG" -format UDZO -o "$FINAL_DMG"
            rm -f "$TMP_DMG"
            rm -rf "$STAGING_DIR"
          fi

          # Also create tar.gz of the binary
          BIN=$(ls build/bin/gitboard* 2>/dev/null | grep -v '\.app' | head -1)
          if [ -n "$BIN" ]; then
            tar -czf "release/gitboard-${{ matrix.target }}.tar.gz" -C build/bin "$(basename "$BIN")"
          fi
          echo "RELEASE_DIR=release" >> $GITHUB_ENV

      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          mkdir release
          if exist "build\bin\gitboard.exe" (
            powershell Compress-Archive -Path "build\bin\gitboard.exe" -DestinationPath "release\gitboard-windows-amd64.zip"
          )
          echo "RELEASE_DIR=release" >> $env:GITHUB_ENV
        shell: cmd

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: ${{ env.RELEASE_DIR }}/
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          merge-multiple: true

      - name: List release files
        run: ls -lhR

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.dmg
            *.AppImage
            *.deb
            *.msi
            *.zip
            *.tar.gz
          generate_release_notes: true
