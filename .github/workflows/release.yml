name: Build and Release (Wails)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - target: darwin-amd64
            runner: macos-13
            goos: darwin
            goarch: amd64
          - target: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
          - target: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Build Wails app
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          wails build -platform ${{ matrix.goos }}/${{ matrix.goarch }} -clean

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          cd build/bin
          mkdir -p release
          tar -czf "release/gitboard-linux-amd64.tar.gz" gitboard
          echo "RELEASE_DIR=build/bin/release" >> $GITHUB_ENV

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          mkdir -p release
          # Wails produces .app bundle in build/bin/
          APP=$(ls -d build/bin/*.app 2>/dev/null | head -1)
          if [ -n "$APP" ]; then
            # Create DMG
            hdiutil create -volname GitBoard \
              -srcfolder "$APP" \
              -ov -format UDZO \
              "release/gitboard-${{ matrix.target }}.dmg"
          fi
          # Also create tar.gz of the binary
          BIN=$(ls build/bin/gitboard* 2>/dev/null | grep -v '\.app' | head -1)
          if [ -n "$BIN" ]; then
            tar -czf "release/gitboard-${{ matrix.target }}.tar.gz" -C build/bin "$(basename "$BIN")"
          fi
          echo "RELEASE_DIR=release" >> $GITHUB_ENV

      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          mkdir release
          if exist "build\bin\gitboard.exe" (
            powershell Compress-Archive -Path "build\bin\gitboard.exe" -DestinationPath "release\gitboard-windows-amd64.zip"
          )
          echo "RELEASE_DIR=release" >> $env:GITHUB_ENV
        shell: cmd

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: ${{ env.RELEASE_DIR }}/
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          merge-multiple: true

      - name: List release files
        run: ls -lhR

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.dmg
            *.AppImage
            *.deb
            *.msi
            *.zip
            *.tar.gz
          generate_release_notes: true
