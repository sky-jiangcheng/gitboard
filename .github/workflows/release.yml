name: Build and Release (Wails)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - target: darwin-amd64
            runner: macos-latest
            goos: darwin
            goarch: amd64
          - target: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
          - target: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate app icons from SVG
        shell: bash
        run: |
          # Install tools for icon conversion
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y librsvg2-bin imagemagick
          elif [ "${{ runner.os }}" = "macOS" ]; then
            brew install librsvg imagemagick || true
          elif [ "${{ runner.os }}" = "Windows" ]; then
            choco install imagemagick -y || true
          fi
          
          # Determine conversion command
          if command -v magick &>/dev/null; then
            IM_CONV="magick"
          elif command -v convert &>/dev/null; then
            # Verify it's ImageMagick, not Windows system convert
            if convert --version 2>/dev/null | grep -qi ImageMagick; then
              IM_CONV="convert"
            else
              IM_CONV=""
            fi
          else
            IM_CONV=""
          fi
          
          SVG="build/icon.svg"
          if [ -f "$SVG" ]; then
            # Generate PNG sizes for different platforms
            mkdir -p build/icons
            
            if command -v rsvg-convert &>/dev/null; then
              rsvg-convert -w 512 -h 512 "$SVG" -o build/icons/icon-512.png
              rsvg-convert -w 256 -h 256 "$SVG" -o build/icons/icon-256.png
              rsvg-convert -w 128 -h 128 "$SVG" -o build/icons/icon-128.png
              rsvg-convert -w 64 -h 64 "$SVG" -o build/icons/icon-64.png
              rsvg-convert -w 48 -h 48 "$SVG" -o build/icons/icon-48.png
              rsvg-convert -w 32 -h 32 "$SVG" -o build/icons/icon-32.png
              rsvg-convert -w 16 -h 16 "$SVG" -o build/icons/icon-16.png
            elif [ -n "$IM_CONV" ]; then
              $IM_CONV "$SVG" -background none -resize 512x512 build/icons/icon-512.png
              $IM_CONV "$SVG" -background none -resize 256x256 build/icons/icon-256.png
              $IM_CONV "$SVG" -background none -resize 128x128 build/icons/icon-128.png
              $IM_CONV "$SVG" -background none -resize 64x64 build/icons/icon-64.png
              $IM_CONV "$SVG" -background none -resize 48x48 build/icons/icon-48.png
              $IM_CONV "$SVG" -background none -resize 32x32 build/icons/icon-32.png
              $IM_CONV "$SVG" -background none -resize 16x16 build/icons/icon-16.png
            fi
            
            # macOS .icns (on macOS runner)
            if [ "${{ runner.os }}" = "macOS" ] && [ -d "build/icons" ]; then
              mkdir -p build/icons/icon.iconset
              cp build/icons/icon-512.png build/icons/icon.iconset/icon_512x512.png
              cp build/icons/icon-256.png build/icons/icon.iconset/icon_256x256.png
              cp build/icons/icon-128.png build/icons/icon.iconset/icon_128x128.png
              cp build/icons/icon-64.png build/icons/icon.iconset/icon_32x32@2x.png
              cp build/icons/icon-32.png build/icons/icon.iconset/icon_32x32.png
              cp build/icons/icon-16.png build/icons/icon.iconset/icon_16x16.png
              iconutil -c icns build/icons/icon.iconset -o build/icons/icon.icns
              rm -rf build/icons/icon.iconset
            fi
            
            # Windows .ico (on Windows runner with ImageMagick)
            if [ "${{ runner.os }}" = "Windows" ] && [ -n "$IM_CONV" ] && [ -d "build/icons" ]; then
              $IM_CONV build/icons/icon-256.png build/icons/icon-128.png build/icons/icon-64.png build/icons/icon-48.png build/icons/icon-32.png build/icons/icon-16.png build/icons/icon.ico
            fi
            
            # Copy main icon for Wails
            if [ -f "build/icons/icon-512.png" ]; then
              cp build/icons/icon-512.png build/appicon.png
            fi
            
            echo "Generated icons:"
            ls -la build/icons/ || true
            ls -la build/appicon.png || true
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build Frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Build Wails app
        shell: bash
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          if [ "${{ runner.os }}" = "Linux" ]; then
            go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
            wails build -platform ${{ matrix.goos }}/${{ matrix.goarch }} -clean -tags webkit2_41
          elif [ "${{ runner.os }}" = "macOS" ] && [ "${{ matrix.goarch }}" = "amd64" ]; then
            GOOS=darwin GOARCH=amd64 go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
            cp $(go env GOPATH)/bin/darwin_amd64/wails $(go env GOPATH)/bin/wails-amd64
            arch -x86_64 $(go env GOPATH)/bin/wails-amd64 build -platform ${{ matrix.goos }}/${{ matrix.goarch }} -clean
          else
            go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
            wails build -platform ${{ matrix.goos }}/${{ matrix.goarch }} -clean
          fi

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          cd build/bin
          mkdir -p release
          tar -czf "release/gitboard-linux-amd64.tar.gz" gitboard
          echo "RELEASE_DIR=build/bin/release" >> $GITHUB_ENV

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          mkdir -p release
          APP=$(ls -d build/bin/*.app 2>/dev/null | head -1)
          if [ -n "$APP" ]; then
            APP_NAME=$(basename "$APP")
            APP_PATH="$APP"
            
            if [ -n "$APPLE_CERTIFICATE" ]; then
              echo "Signing $APP_NAME..."
              echo "$APPLE_CERTIFICATE" | base64 -d -o /tmp/cert.p12
              security create-keychain -p "github-actions" /tmp/signing.keychain
              security import /tmp/cert.p12 -k /tmp/signing.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
              security list-keychains -s /tmp/signing.keychain
              security default-keychain -s /tmp/signing.keychain
              security unlock-keychain -p "github-actions" /tmp/signing.keychain
              codesign --deep --force --sign "$APPLE_TEAM_ID" --options runtime "$APP_PATH"
              echo "Signed successfully"
            fi
            
            STAGING=$(mktemp -d)
            cp -R "$APP" "$STAGING/"
            ln -s /Applications "$STAGING/Applications"
            mkdir -p "$STAGING/.background"
            sips -s format png "build/dmg-background.svg" --out "$STAGING/.background/background.png"
            pip install create-dmg 2>/dev/null || brew install create-dmg 2>/dev/null || curl -sL https://github.com/create-dmg/create-dmg/archive/refs/tags/v1.0.0.tar.gz | tar -xz && cd create-dmg-1.0.0 && sudo make install && cd ..
            create-dmg \
              --volname "$APP_NAME" \
              --window-size 600 400 \
              --icon-size 80 \
              --icon "$APP_NAME" 100 280 \
              --hide-extension "$APP_NAME" \
              --app-drop-link 400 280 \
              --background "$STAGING/.background/background.png" \
              --format UDZO \
              "release/gitboard-${{ matrix.target }}.dmg" \
              "$STAGING/"
            rm -rf "$STAGING"
            
            if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_ID" ]; then
              echo "Notarizing DMG..."
              xcrun notarytool submit "release/gitboard-${{ matrix.target }}.dmg" --keychain-profile "github-actions" --wait 2>&1 || true
              xcrun stapler staple "release/gitboard-${{ matrix.target }}.dmg" 2>&1 || true
            fi
          fi
          echo "RELEASE_DIR=release" >> $GITHUB_ENV

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p release
          if [ -f "build/bin/gitboard.exe" ]; then
            powershell Compress-Archive -Path "build/bin/gitboard.exe" -DestinationPath "release/gitboard-windows-amd64.zip"
          fi
          echo "RELEASE_DIR=release" >> "$GITHUB_ENV"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: ${{ env.RELEASE_DIR }}/
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          merge-multiple: true

      - name: List release files
        run: ls -lhR

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.dmg
            *.AppImage
            *.deb
            *.msi
            *.zip
            *.tar.gz
          generate_release_notes: true
