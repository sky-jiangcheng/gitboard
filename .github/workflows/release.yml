name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            target: linux-amd64
          - os: macos-latest
            arch: amd64
            target: darwin-amd64
          - os: macos-latest
            arch: arm64
            target: darwin-arm64
          - os: windows-latest
            arch: amd64
            target: windows-amd64
            extension: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Build Go Binary
        env:
          GOOS: ${{ fromJson('{"ubuntu-latest":"linux","macos-latest":"darwin","windows-latest":"windows"}')[matrix.os] }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -ldflags="-s -w" -o git-dashboard${{ matrix.extension || '' }} .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-dashboard-${{ matrix.target }}
          path: git-dashboard${{ matrix.extension || '' }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Rename Files
        run: |
          mv git-dashboard-linux-amd64/git-dashboard git-dashboard-linux-amd64
          mv git-dashboard-darwin-amd64/git-dashboard git-dashboard-darwin-amd64
          mv git-dashboard-darwin-arm64/git-dashboard git-dashboard-darwin-arm64
          mv git-dashboard-windows-amd64/git-dashboard.exe git-dashboard-windows-amd64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            git-dashboard-linux-amd64
            git-dashboard-darwin-amd64
            git-dashboard-darwin-arm64
            git-dashboard-windows-amd64.exe
          generate_release_notes: true
